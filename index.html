<!DOCTYPE html>
<html>
<head>
  <title>FOT AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      background: #020617;
      padding: 15px;
      border-right: 1px solid #1e293b;
    }

    .logo {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .sidebar button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      background: #1e293b;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .sidebar button:hover {
      background: #334155;
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 15px;
      border-bottom: 1px solid #1e293b;
      background: #020617;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .bubble {
      padding: 12px;
      margin: 10px 0;
      border-radius: 12px;
      max-width: 70%;
    }

    .user {
      background: #3b82f6;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
    }

    #input-area {
      display: flex;
      padding: 10px;
      background: #020617;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
    }

    button.send {
      margin-left: 5px;
      padding: 10px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">👌 FOT AI</div>

  <button onclick="setSubject('math')">📊 Maths</button>
  <button onclick="setSubject('science')">🧪 Science</button>
  <button onclick="setSubject('english')">📖 English</button>

  <hr>

  <button onclick="clearChat()">🗑 Clear Chat</button>
</div>

<div class="main">
  <header>Study Assistant</header>

  <div id="chat"></div>

  <div id="input-area">
    <input id="input" placeholder="Ask your question..." />
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<script>
let subject = "general";

function setSubject(s) {
  subject = s;
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
}

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value;
  if (!message) return;

  chat.innerHTML += `<div class="bubble user">${message}</div>`;

  chat.innerHTML += `<div class="bubble bot" id="typing">Thinking...</div>`;

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ message, subject })
  });

  const data = await res.json();

  document.getElementById("typing").remove();

  chat.innerHTML += `<div class="bubble bot">${data.reply}</div>`;

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
